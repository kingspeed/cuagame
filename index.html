<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Danh sách HTML</title>

    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
            max-width:900px;
            margin:40px auto;
            padding:20px;
            background:#f5f5f5;
        }

        h1{
            text-align:center;
        }

        ul{
            list-style:none;
            padding:0;
        }

        li{
            background:white;
            margin:10px 0;
            padding:15px;
            border-radius:8px;
            box-shadow:0 2px 6px rgba(0,0,0,.1);
        }

        a{
            text-decoration:none;
            color:#1565c0;
            font-size:18px;
        }

        a:hover{
            text-decoration:underline;
        }

        .path{
            color:#666;
            font-size:13px;
        }
    </style>
</head>
<body>

<h1>📄 Danh sách HTML</h1>

<ul id="list"></ul>

<script>

const owner = "kingspeed";
const repo = "cuagame";
const branch = "main";

async function load(path=""){

    const url =
`https://api.github.com/repos/${owner}/${repo}/contents/${path}?ref=${branch}`;

    const res = await fetch(url);

    const data = await res.json();

    for(const item of data){

        if(item.type==="dir"){
            await load(item.path);
        }

        if(item.type==="file"
            && item.name.endsWith(".html")
            && item.name!="index.html"){

            addItem(item.path);
        }
    }
}

function addItem(path){

    const ul=document.getElementById("list");

    const li=document.createElement("li");

    li.innerHTML=`
        <a href="${path}">
            ${path.split("/").pop()}
        </a>
        <div class="path">${path}</div>
    `;

    ul.appendChild(li);
}

load();

</script>

</body>
</html>
